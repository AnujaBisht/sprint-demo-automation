name: Weekly Jira Tickets to Confluence

on:
  workflow_dispatch:
  schedule:
    - cron: '30 3 * * 1'

jobs:
  fetch-and-summarize:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.JIRA_BASE_URL }}" ]; then echo "Missing JIRA_BASE_URL"; exit 1; fi
          if [ -z "${{ secrets.JIRA_EMAIL }}" ]; then echo "Missing JIRA_EMAIL"; exit 1; fi
          if [ -z "${{ secrets.JIRA_API_TOKEN }}" ]; then echo "Missing JIRA_API_TOKEN"; exit 1; fi
          if [ -z "${{ secrets.JIRA_BOARD_ID }}" ]; then echo "Missing JIRA_BOARD_ID"; exit 1; fi
          if [ -z "${{ secrets.CONFLUENCE_BASE_URL }}" ]; then echo "Missing CONFLUENCE_BASE_URL"; exit 1; fi
          if [ -z "${{ secrets.CONFLUENCE_EMAIL }}" ]; then echo "Missing CONFLUENCE_EMAIL"; exit 1; fi
          if [ -z "${{ secrets.CONFLUENCE_API_TOKEN }}" ]; then echo "Missing CONFLUENCE_API_TOKEN"; exit 1; fi
          if [ -z "${{ secrets.CONFLUENCE_SPACE_KEY }}" ]; then echo "Missing CONFLUENCE_SPACE_KEY"; exit 1; fi
          if [ -z "${{ secrets.GEMINI_API_KEY }}" ]; then echo "Missing GEMINI_API_KEY"; exit 1; fi
          echo "All secrets validated"

      - name: Fetch active sprint
        run: |
          response=$(curl -s -u "${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
          -H "Accept: application/json" \
          "${{ secrets.JIRA_BASE_URL }}/rest/agile/1.0/board/${{ secrets.JIRA_BOARD_ID }}/sprint?state=active")

          echo "$response" | jq '.'

          sprint_id=$(echo "$response" | jq -r '.values[0].id')
          sprint_name=$(echo "$response" | jq -r '.values[0].name')

          if [ -z "$sprint_id" ] || [ "$sprint_id" = "null" ]; then
            echo "No active sprint found"
            exit 1
          fi

          echo "Active Sprint: $sprint_name (ID: $sprint_id)"

          echo "SPRINT_ID=$sprint_id" >> $GITHUB_ENV
          echo "SPRINT_NAME=$sprint_name" >> $GITHUB_ENV

      - name: Fetch IN REVIEW tickets
        run: |
          response=$(curl -s -u "${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
          -H "Accept: application/json" \
          --get \
          --data-urlencode "jql=sprint=${SPRINT_ID} AND status=\"In Review\"" \
          "${{ secrets.JIRA_BASE_URL }}/rest/api/3/search?fields=key,summary,description,status,assignee")

          echo "$response" > in_review_tickets.json

          echo "IN REVIEW Tickets:"
          jq '.issues | length' in_review_tickets.json

      - name: Fetch DONE tickets
        run: |
          response=$(curl -s -u "${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
          -H "Accept: application/json" \
          --get \
          --data-urlencode "jql=sprint=${SPRINT_ID} AND statusCategory=Done" \
          "${{ secrets.JIRA_BASE_URL }}/rest/api/3/search?fields=key,summary,description,status,assignee")

          echo "$response" > done_tickets.json

          echo "DONE Tickets:"
          jq '.issues | length' done_tickets.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install @google/generative-ai

      - name: Generate summaries
        run: node generate-summaries.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SPRINT_NAME: ${{ env.SPRINT_NAME }}

      - name: Create/Update Confluence page
        run: |
          IN_REVIEW_SUMMARY=$(cat in_review_summary.txt)
          DONE_SUMMARY=$(cat done_summary.txt)

          CURRENT_DATE=$(date '+%Y-%m-%d')

          PAGE_TITLE="Sprint Summary - ${{ env.SPRINT_NAME }} - $CURRENT_DATE"

          CONTENT=$(cat <<EOF
          {
            "type": "doc",
            "version": 1,
            "content": [
              {
                "type": "heading",
                "attrs": { "level": 1 },
                "content": [
                  {
                    "type": "text",
                    "text": "$PAGE_TITLE"
                  }
                ]
              },
              {
                "type": "heading",
                "attrs": { "level": 2 },
                "content": [
                  {
                    "type": "text",
                    "text": "📋 In Review Tickets"
                  }
                ]
              },
              {
                "type": "paragraph",
                "content": [
                  {
                    "type": "text",
                    "text": "$IN_REVIEW_SUMMARY"
                  }
                ]
              },
              {
                "type": "heading",
                "attrs": { "level": 2 },
                "content": [
                  {
                    "type": "text",
                    "text": "✅ Completed Tickets"
                  }
                ]
              },
              {
                "type": "paragraph",
                "content": [
                  {
                    "type": "text",
                    "text": "$DONE_SUMMARY"
                  }
                ]
              }
            ]
          }
          EOF
          )

          PAGE_RESPONSE=$(curl -s -u "${{ secrets.CONFLUENCE_EMAIL }}:${{ secrets.CONFLUENCE_API_TOKEN }}" \
          -H "Accept: application/json" \
          "${{ secrets.CONFLUENCE_BASE_URL }}/wiki/api/v2/spaces/${{ secrets.CONFLUENCE_SPACE_KEY }}/pages?title=$(echo $PAGE_TITLE | jq -sRr @uri)")

          PAGE_ID=$(echo "$PAGE_RESPONSE" | jq -r '.results[0].id // empty')

          if [ -z "$PAGE_ID" ]; then
            echo "Creating new Confluence page..."

            curl -s -X POST \
            -u "${{ secrets.CONFLUENCE_EMAIL }}:${{ secrets.CONFLUENCE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"spaceId\": \"${{ secrets.CONFLUENCE_SPACE_KEY }}\",
              \"title\": \"$PAGE_TITLE\",
              \"body\": {
                \"representation\": \"atlas_doc_format\",
                \"value\": $(echo "$CONTENT" | jq -Rs .)
              }
            }" \
            "${{ secrets.CONFLUENCE_BASE_URL }}/wiki/api/v2/pages"

          else
            echo "Updating existing page..."

            VERSION=$(echo "$PAGE_RESPONSE" | jq -r '.results[0].version.number')
            NEW_VERSION=$((VERSION + 1))

            curl -s -X PUT \
            -u "${{ secrets.CONFLUENCE_EMAIL }}:${{ secrets.CONFLUENCE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"version\": { \"number\": $NEW_VERSION },
              \"title\": \"$PAGE_TITLE\",
              \"body\": {
                \"representation\": \"atlas_doc_format\",
                \"value\": $(echo "$CONTENT" | jq -Rs .)
              }
            }" \
            "${{ secrets.CONFLUENCE_BASE_URL }}/wiki/api/v2/pages/$PAGE_ID"
          fi

          echo "Confluence page updated successfully"

      - name: Cleanup
        if: always()
        run: rm -f in_review_tickets.json done_tickets.json in_review_summary.txt done_summary.txt
