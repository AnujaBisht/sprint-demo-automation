name: Weekly Jira Done Tickets

on:
  workflow_dispatch:
  schedule:
    - cron: '30 3 * * 1'

jobs:
  fetch-jira-done:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.JIRA_BASE_URL }}" ]; then exit 1; fi
          if [ -z "${{ secrets.JIRA_EMAIL }}" ]; then exit 1; fi
          if [ -z "${{ secrets.JIRA_API_TOKEN }}" ]; then exit 1; fi
          if [ -z "${{ secrets.JIRA_BOARD_ID }}" ]; then exit 1; fi
          echo "Secrets OK"

      - name: Fetch active sprint
        run: |
          response=$(curl -s -u "${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
          -H "Accept: application/json" \
          "${{ secrets.JIRA_BASE_URL }}/rest/agile/1.0/board/${{ secrets.JIRA_BOARD_ID }}/sprint?state=active")

          echo "$response"

          sprint_id=$(echo "$response" | jq -r '.values[0].id')

          if [ -z "$sprint_id" ] || [ "$sprint_id" = "null" ]; then
            echo "No active sprint"
            exit 1
          fi

          echo "SPRINT_ID=$sprint_id" >> $GITHUB_ENV

      - name: Fetch DONE tickets
        run: |
          response=$(curl -s -u "${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
          -H "Accept: application/json" \
          --get \
          --data-urlencode 'jql=status=Done' \
          "${{ secrets.JIRA_BASE_URL }}/rest/agile/1.0/sprint/${SPRINT_ID}/issue")

          echo "$response" > tickets.json

      - name: Verify tickets file
        run: |
          ls -la
          cat tickets.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install openai

      - name: Generate AI summaries
        run: node generate-summary.js
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
